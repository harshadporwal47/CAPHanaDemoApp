_schema-version: "3.1"
ID: CAPHanaDemoApp
description: CAP Application with SAP HANA Cloud - Invoice Management
version: 1.0.0

# ─────────────────────────────────────────────────────────────────────────────
# Global build: runs before any module is built
#   1. Install all dependencies
#   2. CDS build → produces gen/srv/ and gen/db/
#   3. Copy Fiori webapp into gen/srv/app/ so the CAP server can serve it
# ─────────────────────────────────────────────────────────────────────────────
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --production=false
        - npx cds build --production
        - node scripts/copy-app.js

# ─────────────────────────────────────────────────────────────────────────────
# Modules
# ─────────────────────────────────────────────────────────────────────────────
modules:

  # ── Application Router ────────────────────────────────────────────────────
  # Entry point for all browser traffic. Handles XSUAA OAuth2 login and
  # proxies every request (UI + OData) to the CAP server.
  - name: CAPHanaDemoApp-approuter
    type: nodejs
    path: approuter
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 256M
      memory: 256M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
    requires:
      - name: CAPHanaDemoApp-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  # ── Node.js Application Server ────────────────────────────────────────────
  # Hosts the CAP OData service AND serves the Fiori static files from app/.
  - name: CAPHanaDemoApp-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 512M
      memory: 512M
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - .env
        - default-env.json
    requires:
      - name: CAPHanaDemoApp-db
      - name: CAPHanaDemoApp-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HDI DB Deployer ───────────────────────────────────────────────────────
  # Deploys HANA artefacts (hdbtable, hdbview, etc.) to the HDI container.
  - name: CAPHanaDemoApp-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 256M
      memory: 256M
    build-parameters:
      ignore:
        - node_modules/
    requires:
      - name: CAPHanaDemoApp-db

# ─────────────────────────────────────────────────────────────────────────────
# Resources (BTP managed services — created automatically by cf deploy)
# ─────────────────────────────────────────────────────────────────────────────
resources:

  # ── SAP HANA Cloud HDI Container ──────────────────────────────────────────
  - name: CAPHanaDemoApp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}

  # ── XSUAA (Authentication & Authorization) ────────────────────────────────
  - name: CAPHanaDemoApp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: CAPHanaDemoApp-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          redirect-uris:
            - "https://${org}-${space}-caphanademoapp-approuter.${default-domain}/**"
