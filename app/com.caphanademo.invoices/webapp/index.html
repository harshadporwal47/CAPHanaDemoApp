<!DOCTYPE html>
<html style="height: 100%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Invoice Management</title>

		<script
			id="sap-ui-bootstrap"
			src="https://sapui5.hana.ondemand.com/1.120.23/resources/sap-ui-core.js"
			data-sap-ui-theme="sap_horizon"
			data-sap-ui-libs="sap.m,sap.ui.core,sap.fe.templates"
			data-sap-ui-resource-roots='{"com.caphanademo.invoices": "./"}'
			data-sap-ui-compat-version="edge"
			data-sap-ui-async="true"
			data-sap-ui-preload="off"
			data-sap-ui-frame-options="trusted"
		></script>
	</head>

	<body class="sapUiBody" style="height: 100%; overflow: hidden; margin: 0; padding: 0">
		<div id="content" style="height: 100%"></div>

		<script>
			sap.ui.require(["sap/ui/core/ComponentContainer"], function (ComponentContainer) {
				"use strict";
				var oContainer = new ComponentContainer({
					id   : "container-com.caphanademo.invoices",
					name : "com.caphanademo.invoices",
					async: true,
					height: "100%",
					width : "100%",
					componentCreated: function (oEvent) {
						console.log("Component initialised:", oEvent.getParameter("component").getId());
					},
					componentFailed: function (oEvent) {
						console.error("Component FAILED:", oEvent.getParameter("reason"));
						document.getElementById("content").innerHTML =
							"<pre style='color:red;padding:2rem'>Component failed to load:<br>" +
							JSON.stringify(oEvent.getParameter("reason"), null, 2) + "</pre>";
					}
				});
				oContainer.placeAt("content");
			});
		</script>
	</body>
</html>
